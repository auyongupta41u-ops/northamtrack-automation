🔄 Scraper Features
Processing Pipeline
Plain Text
1. Fetch 16 RSS feeds (parallel)
2. Parse XML
3. Extract: title, link, date, description
4. Check duplicates (source_url)
5. Categorize (6 categories)
6. Rate impact (HIGH/MEDIUM/LOW)
7. Calculate relevance (0-100%)
8. Extract tags (5 tags max)
9. Generate summary
10. Store in Supabase
11. Log statistics & errors
Duplicate Prevention
Primary key: source_url (UNIQUE)
Verification: SHA256 hash of (title + date)
Scope: Cross-regulator (catches duplicates across all 8 regulators)
Persistence: Stored in processed_hashes table
Categorization
JavaScript
"enforcement_order" ← enforcement, charges, sanction, cease-and-desist
"settlement"       ← settlement, agrees, resolves, admits
"investor_alert"   ← alert, warning, fraud, scam
"decision"         ← decision, ruling, order, judgment
"regulatory_notice" ← guidance, proposes, rule, amendment
"news"             ← default
Impact Rating
JavaScript
HIGH   ← landmark, historic, major, billion, cease-and-desist
MEDIUM ← settlement, million, enforcement, consultation
LOW    ← default
Relevance Scoring
JavaScript
100% ← mutual fund, etf, investment company
90%  ← investment adviser, asset manager
80%  ← broker-dealer, dealer
70%  ← fee, performance, disclosure
50%  ← investor, securities, compliance
40%  ← cryptocurrency, crypto
