name: Regulatory Automation Scraper

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # REMOVED: cache: 'npm'  ← causes the lock file error when no lock file exists

      - name: Install dependencies
        run: npm install   # ← changed from "npm ci" to "npm install"

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_number }}
        run: node scraper.js

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore   # ← stops the "no files found" warning
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            // Scheduled runs have no issue context — use a repo dispatch or 
            // create an issue instead of commenting on a non-existent issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Scraper failed — Run #${context.runNumber}`,
              body: `Regulatory automation scraper failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the workflow logs for details.`,
              labels: ['scraper-failure']
            })
