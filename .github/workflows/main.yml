scraper.yml
name: Regulatory Automation Scraper

on:
  schedule:
    # Run every 6 hours (at 0, 6, 12, 18 UTC)
    - cron: '0 0,6,12,18 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    name: Regulatory Automation Scraper
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_number }}
        run: node scraper.js
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Notify on failure
        if: failure()
        run: echo '❌ Scraper failed. Check logs above.'
